name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true
      - uses: arduino/setup-task@v2
      - name: lint
        run: task lint
      - name: unit tests
        run: task test
      - name: e2e tests
        run: task e2e

  release-snapshot:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

  nix-build:
    name: nix build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: nix build
        run: nix build .#default --print-build-logs
      - name: nix run --version
        run: |
          result=$(nix run .#default -- --version)
          echo "got: $result"
          echo "$result" | grep -E '^[^ ]+ [^ ]+ [^ ]+$'
