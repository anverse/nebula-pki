version: "3"

# Top-level task runner for nebula-pki.
# Targets that wrap goreleaser/nix expect those tools to be on PATH; the
# dev shell from flake.nix provides them.

vars:
  BINARY: nebula-pki
  PKG: ./cmd/nebula-pki

env:
  # Container runtime for scripts/smoke-test/*; override via shell env or .envrc.
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  # Dev ldflags — release builds inject real values via goreleaser.
  LDFLAGS: '-s -w -X github.com/anverse/nebula-pki/internal/buildinfo.Version=dev -X github.com/anverse/nebula-pki/internal/buildinfo.Commit={{.GIT_COMMIT}} -X github.com/anverse/nebula-pki/internal/buildinfo.Date={{.BUILD_DATE}}'

tasks:
  verify:
    desc: Review step — lint, build, and run all tests
    cmds:
      - task: lint
      - task: build
      - task: test
      - task: e2e

  build:
    desc: Build the nebula-pki binary into bin/
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY}} {{.PKG}}

  run:
    desc: Build and run the binary with arbitrary args, e.g. `task run -- check -c examples/business/nebula.hcl`
    deps: [build]
    cmds:
      - ./bin/{{.BINARY}} {{.CLI_ARGS}}

  check:examples:
    desc: Run `nebula-pki check` against every example HCL (most will fail until encryption ships)
    deps: [build]
    cmds:
      - |
        for f in examples/**/*.hcl; do
          echo "--- $f ---"
          ./bin/{{.BINARY}} check -c "$f" || true
        done

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  e2e:
    desc: Run end-to-end testscript suite
    deps: [build]
    cmds:
      - go test ./test/e2e/...

  lint:
    desc: go vet + gofmt check
    cmds:
      - go vet ./...
      - cmd: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt issues:"
            echo "$out"
            exit 1
          fi
        silent: true

  fmt:
    desc: Format all Go source files
    cmds:
      - go fmt ./...

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts (bin/)
    cmds:
      - rm -rf bin

  test:cover:
    desc: Run unit tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  goreleaser:snapshot:
    desc: Dry-run the goreleaser pipeline locally (no publish)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Cut a real release — bumps flake, commits, tags, pushes (use `task release VERSION=vX.Y.Z`). See spec/adr/014-flake-version-sync.md.
    silent: true
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: 'VERSION is required, e.g. `task release VERSION=v0.0.3`'
    cmds:
      - ./scripts/release.sh {{.VERSION}}

  nix:build:
    desc: Build via the nix flake
    cmds:
      - nix build .#default

  nix:run:
    desc: Run the flake-built binary's --version
    cmds:
      - nix run .#default -- --version

  smoke:brew:
    desc: Smoke-test the latest released nebula-pki via Homebrew in an isolated container
    cmds:
      - ./scripts/smoke-test/brew.sh

  smoke:nix:
    desc: Smoke-test the latest released nebula-pki flake in an isolated nix container
    cmds:
      - ./scripts/smoke-test/nix.sh

  smoke:
    desc: Run all release smoke tests (brew + nix)
    cmds:
      - task: smoke:brew
      - task: smoke:nix
