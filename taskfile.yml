version: "3"

# Top-level task runner for nebula-pki.
# Targets that wrap goreleaser/nix expect those tools to be on PATH; the
# dev shell from flake.nix provides them.

vars:
  BINARY: nebula-pki
  PKG: ./cmd/nebula-pki

env:
  # Container runtime for scripts/e2e/*; override via shell env or .envrc.
  CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  # Dev ldflags — release builds inject real values via goreleaser.
  LDFLAGS: '-s -w -X github.com/anverse/nebula-pki/internal/buildinfo.Version=dev -X github.com/anverse/nebula-pki/internal/buildinfo.Commit={{.GIT_COMMIT}} -X github.com/anverse/nebula-pki/internal/buildinfo.Date={{.BUILD_DATE}}'

tasks:
  verify:
    desc: Review step — lint, build, and run all tests
    cmds:
      - task: lint
      - task: build
      - task: test
      - task: test:e2e

  build:
    desc: Build the nebula-pki binary into bin/
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY}} {{.PKG}}

  run:
    desc: Build and run the binary with arbitrary args, e.g. `task run -- check -c examples/business/nebula.hcl`
    deps: [build]
    cmds:
      - ./bin/{{.BINARY}} {{.CLI_ARGS}}

  check:examples:
    desc: Run `nebula-pki check` against every example HCL (most will fail until encryption ships)
    deps: [build]
    cmds:
      - |
        for f in examples/**/*.hcl; do
          echo "--- $f ---"
          ./bin/{{.BINARY}} check -c "$f" || true
        done

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:e2e:
    desc: Run end-to-end testscript suite
    deps: [build]
    cmds:
      - go test ./test/e2e/...

  lint:
    desc: go vet + gofmt check
    cmds:
      - go vet ./...
      - |
        out=$(gofmt -l .)
        if [ -n "$out" ]; then
          echo "gofmt issues:"
          echo "$out"
          exit 1
        fi

  release:snapshot:
    desc: Smoke-test the release pipeline locally (no publish)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Cut a real release (invoked by CI on tag push)
    cmds:
      - goreleaser release --clean

  nix:build:
    desc: Build via the nix flake
    cmds:
      - nix build .#default

  nix:run:
    desc: Run the flake-built binary's --version
    cmds:
      - nix run .#default -- --version

  e2e:brew:
    desc: Install latest released nebula-pki via Homebrew in an isolated container
    cmds:
      - ./scripts/e2e/brew.sh

  e2e:nix:
    desc: Run latest released nebula-pki flake in an isolated nix container
    cmds:
      - ./scripts/e2e/nix.sh

  e2e:install:
    desc: Run both installer e2e checks (brew + nix)
    cmds:
      - task: e2e:brew
      - task: e2e:nix
